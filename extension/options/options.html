<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>웹보안관 설정</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container animate-fade-in">
        <header class="header">
            <div class="logo-area">
                <span class="logo-icon">🛡️</span>
                <h1 class="logo-title">웹보안관</h1>
            </div>
            <p class="logo-subtitle">보안 어시스턴트 환경 설정</p>
        </header>

        <main class="settings-card">
            <div class="section-title">
                <h2>API 서버 모드 설정</h2>
                <p>보안 판정 및 위협 요약 분석을 수행할 백엔드 API 서버를 지정합니다.</p>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <span class="setting-label">로컬 / 원격 서버 전환</span>
                    <span class="setting-description" id="server-status-desc">로컬 개발용 API 서버(localhost)를 사용합니다.</span>
                </div>
                <div class="toggle-switch-container">
                    <label class="toggle-switch">
                        <input type="checkbox" id="serverModeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="server-details" id="serverDetails">
                <div class="details-row">
                    <span class="details-label">현재 API 주소</span>
                    <span class="details-val" id="apiEndpoint">http://localhost:8000</span>
                </div>
                <div class="details-row">
                    <span class="details-label">원격 서버 IP 입력</span>
                    <input type="text" id="remoteIpInput" class="ip-highlight" style="font-family: monospace; font-weight: 600; text-align: center; border: 1px solid #bfdbfe; border-radius: 4px; padding: 2px 6px; width: 120px;" placeholder="12.34.56.78">
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 웹보안관. All rights reserved.</p>
        </footer>
    </div>

    <!-- Include api.js for getBaseURL if needed, and options.js -->
    <script src="../content/api.js"></script>
    <script src="options.js"></script>
</body>
</html>
