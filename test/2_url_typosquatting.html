<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>NAVER 로그인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
  .header { background: #03c75a; padding: 14px 24px; }
  .header .logo { color: white; font-size: 26px; font-weight: 900; letter-spacing: -1px; }
  .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .login-box { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; text-align: center; }
  .form-group { margin-bottom: 12px; }
  .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
  .form-group input:focus { border-color: #03c75a; }
  .login-btn { width: 100%; padding: 13px; background: #03c75a; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .login-btn:hover { background: #02b351; }
  .links { display: flex; justify-content: center; gap: 16px; margin-top: 16px; }
  .links a { font-size: 13px; color: #666; text-decoration: none; }
  .links a:hover { color: #03c75a; }
  .divider { width: 1px; height: 12px; background: #ddd; align-self: center; }
  .social { margin-top: 20px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
  .social p { font-size: 12px; color: #999; text-align: center; margin-bottom: 12px; }
  .social-btn { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 6px; background: white; font-size: 13px; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .footer { text-align: center; padding: 20px; color: #bbb; font-size: 11px; }
  /* 시연 안내 */
  .demo-badge { position: fixed; top: 10px; right: 10px; background: #FF5722; color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .demo-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; z-index: 9999; white-space: nowrap; }
  /* URL에서 도메인 하이라이트 (시연용) */
  .url-display { background: #fff3e0; border: 1px solid #ffb74d; border-radius: 6px; padding: 10px 14px; margin-bottom: 20px; font-size: 12px; color: #e65100; word-break: break-all; }
  .url-display span.danger { font-weight: 700; background: #ff5722; color: white; padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
<div class="demo-badge">🔴 시나리오 2: URL 타이포스쿼팅</div>
<div class="demo-hint">💡 이 페이지 링크에 마우스를 올려보세요 — Levenshtein 탐지 동작</div>

<div class="header">
  <div class="logo">NAVER</div>
</div>

<div class="login-wrap">
  <div class="login-box">
    <div class="url-display">
      현재 URL: <span class="danger">naver-account-secure.xyz</span>/login.html<br>
      <small style="color:#999">정상 도메인: naver.com</small>
    </div>
    <h2>로그인</h2>
    <div class="form-group">
      <input type="text" placeholder="아이디" autocomplete="off">
    </div>
    <div class="form-group">
      <input type="password" placeholder="비밀번호">
    </div>
    <button class="login-btn">로그인</button>
    <div class="links">
      <a href="#">아이디 찾기</a>
      <div class="divider"></div>
      <a href="#">비밀번호 찾기</a>
      <div class="divider"></div>
      <a href="#">회원가입</a>
    </div>
    <div class="social">
      <p>또는 간편 로그인</p>
      <button class="social-btn">🍎 Apple로 로그인</button>
      <button class="social-btn">🔵 카카오로 로그인</button>
    </div>
  </div>
</div>

<div class="footer">© NAVER Corp.</div>

<script>
// 시연용: 페이지 내 링크들에 악성 도메인 삽입
document.querySelectorAll('a').forEach(a => {
  if(a.href && a.href.startsWith('http')) return;
});

// 페이지 URL을 악성 도메인처럼 보이게 콘솔 출력
console.log('[시연] 현재 페이지는 naver-account-secure.xyz를 시뮬레이션합니다.');
console.log('[시연] Levenshtein("naver-account-secure", "naver") → 타이포스쿼팅 탐지 예상');
</script>
</body>
</html>
